services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rossmann_api
    ports:
      - "8000:8000"
    volumes:
      - artifacts:/app/artifacts
      - logs:/app/logs
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rossmann_streamlit
    command: ["streamlit", "run", "app/streamlit_app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    ports:
      - "8501:8501"
    volumes:
      - artifacts:/app/artifacts
      - logs:/app/logs
      - ./data:/app/data
    environment:
      - API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  artifacts:
  logs:
